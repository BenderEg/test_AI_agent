services:
  backend:
    build: .
    container_name: repo_parser_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      qdrant:
        condition: service_started
      ollama:
        condition: service_started
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.17
    container_name: qdrant
    restart: unless-stopped
    ports:
      - 6333:6333
    volumes:
      - qdrant_storage:/qdrant/storage

  ollama:
    image: ollama/ollama:0.21.2
    container_name: ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - 11434:11434
    
volumes:
  qdrant_storage:
  ollama_data: